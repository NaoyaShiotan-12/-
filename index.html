<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daily Planner</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">

</head>

<body>

<header>
<h1>📅 Daily Planner</h1>
<button id="darkBtn">🌙</button>
</header>

<!-- ログイン・ログアウト用のボタンエリア（追加） -->
<div id="authContainer" style="margin: 10px; text-align: right; padding-right: 10px;">
  <button id="loginBtn">Googleでログイン</button>
  <button id="logoutBtn" style="display: none;">ログアウト</button>
  <span id="userInfo" style="margin-left: 10px; font-size: 14px; font-weight: bold;"></span>
</div>

<div class="calendar-header">
<button id="prevBtn">←</button>
<h2 id="monthLabel"></h2>
<button id="nextBtn">→</button>
</div>

<div id="calendar"></div>

<div class="input-area">
<input type="number" id="hour" placeholder="時">
<input type="number" id="minute" placeholder="分">
<input type="text" id="task" placeholder="予定">

<select id="priority">
<option value="normal">通常</option>
<option value="high">高</option>
<option value="urgent">至急</option>
</select>

<button id="voiceBtn">🎤</button>
<button id="addBtn">追加</button>
</div>

<h3 id="selectedDate"></h3>
<ul id="taskList"></ul>
<div id="stickyContainer"></div>

</body>
</html>
